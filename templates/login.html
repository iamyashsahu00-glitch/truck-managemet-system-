<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FleetEntry Management</title>
    <meta name="description" content="Secure login portal for FleetEntry Management System.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-theme login-page">
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="logo-icon logo-icon-large">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                </div>
                <h2>FleetEntry Control Portal</h2>
                <p>Enter credentials to access the fleet control deck</p>
            </div>
            
            {% if error %}
            <div class="login-error-alert">
                <span class="alert-icon">✕</span>
                <span class="alert-msg">{{ error }}</span>
            </div>
            {% endif %}
            
            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="e.g. owner or staff" autocomplete="off" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary login-btn">
                    <span>Sign In to Terminal</span>
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
            
            <div class="login-footer">
                <div class="credentials-notice">
                    <h4>Demo Credentials:</h4>
                    <div class="cred-row">
                        <span class="cred-lbl">Owner:</span>
                        <span class="cred-val"><code>owner</code> / <code>owner123</code></span>
                    </div>
                    <div class="cred-row">
                        <span class="cred-lbl">Staff:</span>
                        <span class="cred-val"><code>staff</code> / <code>staff123</code></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="login-bg-visual">
            <div class="visual-grid-overlay"></div>
        </div>
    </div>
</body>
</html>
